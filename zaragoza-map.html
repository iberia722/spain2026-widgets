<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaragoza Map · Spain 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #f7f6f3; display: flex; flex-direction: column; height: 100vh; }
  .header { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e8e5e0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
  .header-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .header-sub { font-size: 10px; color: #aaa; margin-top: 1px; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #666; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.15); flex-shrink: 0; }
  #map { flex: 1; width: 100%; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">🏛 Zaragoza · Mar 23–24</div>
    <div class="header-sub">Spain 2026 · 10 locations · click pins for details</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e07020"></div> Hotel</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Church</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2980b9"></div> Site / Plaza</div>
    <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> Restaurant</div>
  </div>
</div>
<div id="map"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map').setView([41.6555, -0.878], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
}).addTo(map);

const COLORS = { hotel:'#e07020', church:'#c0392b', site:'#2980b9', plaza:'#2980b9', food:'#27ae60' };

function makeIcon(type, isHotel) {
  const color = COLORS[type] || '#666';
  const svg = isHotel
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28"><path d="M3 0H19V16H14V24H8V16H3Z" fill="${color}" stroke="white" stroke-width="1.5"/></svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"><circle cx="9" cy="9" r="7" fill="${color}" stroke="white" stroke-width="2"/></svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: isHotel?[22,28]:[18,18], iconAnchor: isHotel?[11,28]:[9,9], popupAnchor: [0, isHotel?-28:-9] });
}

[
  { name:"🏨 Catalonia El Pilar", type:"hotel", isHotel:true, lat:41.6560204, lng:-0.8813058, typeLabel:"Hotel · Your Base", note:"Casco Antiguo · right by Plaza del Pilar · 4.6★", url:"https://maps.google.com/?cid=4225154226224468849" },
  { name:"Basílica del Pilar", type:"church", lat:41.6568982, lng:-0.8785056, typeLabel:"Basilica", note:"Iconic baroque basilica · climb the tower for views · 4.8★", url:"https://maps.google.com/?cid=3213200630656087169" },
  { name:"Plaza del Pilar", type:"plaza", lat:41.6563468, lng:-0.8789063, typeLabel:"Plaza", note:"Heart of Zaragoza · stunning at sunset · 4.8★", url:"https://maps.google.com/?cid=13574183222196343141" },
  { name:"La Seo Cathedral", type:"church", lat:41.6545606, lng:-0.8757358, typeLabel:"Cathedral · UNESCO", note:"Less crowded than Pilar · excellent audio guide · 4.7★", url:"https://maps.google.com/?cid=13381991985108382624" },
  { name:"Puente de Piedra", type:"site", lat:41.6572038, lng:-0.8753503, typeLabel:"Bridge", note:"Best views of the Basílica · go at sunset · 4.7★", url:"https://maps.google.com/?cid=18431461918467237931" },
  { name:"Aljafería Palace", type:"site", lat:41.6560942, lng:-0.8970488, typeLabel:"Moorish Palace", note:"Stunning Moorish palace · closed Sun afternoons · 4.6★", url:"https://maps.google.com/?cid=6380629443139288320" },
  { name:"Murallas Romanas", type:"site", lat:41.657143, lng:-0.8818188, typeLabel:"Roman Walls", note:"Ancient Roman ruins · climb tourist office for aerial views · 4.5★", url:"https://maps.google.com/?cid=14204101896496828065" },
  { name:"🍽 Casa Lac", type:"food", lat:41.6527367, lng:-0.8800939, typeLabel:"Restaurant · Top Pick", note:"Try the lamb & tomato soup · Closed Mon · 4.5★", url:"https://maps.google.com/?cid=16286301676080578204" },
  { name:"🍽 El Picadillo", type:"food", lat:41.656159, lng:-0.88114, typeLabel:"Tapas Bar", note:"Classic tapas right next to your hotel · 4.1★", url:"https://maps.google.com/?cid=13542684945331692819" },
  { name:"🍽 El Tubo (Tapas Street)", type:"food", lat:41.653053, lng:-0.87955, typeLabel:"Tapas District", note:"Lively tapas street in the old town · great at night", url:"https://maps.google.com/?cid=17813351833430386068" }
].forEach(p => {
  L.marker([p.lat, p.lng], { icon: makeIcon(p.type, p.isHotel), zIndexOffset: p.isHotel?1000:0 })
   .addTo(map)
   .bindPopup(`<div style="font-family:'IBM Plex Sans',sans-serif;min-width:180px;max-width:220px">
     <div style="font-weight:600;font-size:13px;color:#1a1a1a;margin-bottom:2px">${p.name}</div>
     <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:${COLORS[p.type]||'#666'};margin-bottom:4px">${p.typeLabel}</div>
     <div style="font-size:11px;color:#555;line-height:1.45">${p.note}</div>
     <a href="${p.url}" target="_blank" style="display:inline-block;margin-top:5px;font-size:10px;color:#2980b9;text-decoration:none">Open in Google Maps ↗</a>
   </div>`, { maxWidth:240 });
});
</script>
</body>
</html>
