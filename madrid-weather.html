<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madrid Weather · Spain 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 20px 24px; max-width: 600px; width: 100%; }
  .city-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .city-name { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #2d3748; }
  .city-dates { font-size: 10px; color: #94a3b8; font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .refresh-btn { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 14px; padding: 2px; transition: color 0.15s; }
  .refresh-btn:hover { color: #64748b; }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
  .day-card { background: #f8fafc; border: 1px solid #e8edf2; border-radius: 10px; padding: 10px 6px; text-align: center; transition: box-shadow 0.15s; }
  .day-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .day-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; }
  .day-date { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #cbd5e1; margin-bottom: 7px; }
  .weather-icon { font-size: 22px; margin-bottom: 6px; display: block; line-height: 1; }
  .condition { font-size: 9px; color: #64748b; margin-bottom: 7px; min-height: 26px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
  .temps { display: flex; justify-content: center; gap: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .hi { color: #e07020; font-weight: 600; }
  .lo { color: #5588bb; }
  .sun-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; border-top: 1px solid #f0f0f0; padding-top: 14px; }
  .sun-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .sun-label { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #94a3b8; }
  .sun-item { display: flex; align-items: center; gap: 2px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #475569; }
  .footer { margin-top: 12px; font-size: 9px; color: #cbd5e1; font-family: 'IBM Plex Mono', monospace; text-align: right; }
  .loading-text { color: #94a3b8; font-size: 11px; text-align: center; padding: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="city-header">
    <div>
      <div class="city-name">👑 Madrid</div>
      <div class="city-dates">Mar 24 – 28 · 2026</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()" title="Refresh">↻</button>
  </div>
  <div class="days-grid" id="daysGrid">
    <div class="loading-text" style="grid-column:span 5">Loading forecast…</div>
  </div>
  <div class="sun-strip" id="sunStrip"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
const DATES = ['2026-03-24','2026-03-25','2026-03-26','2026-03-27','2026-03-28'];
const DAY_NAMES   = { '2026-03-24':'Tue','2026-03-25':'Wed','2026-03-26':'Thu','2026-03-27':'Fri','2026-03-28':'Sat' };
const DATE_LABELS = { '2026-03-24':'Mar 24','2026-03-25':'Mar 25','2026-03-26':'Mar 26','2026-03-27':'Mar 27','2026-03-28':'Mar 28' };

const WMO = {
  0:['☀️','Clear'], 1:['🌤','Mostly Sunny'], 2:['⛅','Partly Cloudy'], 3:['☁️','Overcast'],
  45:['🌫','Foggy'], 48:['🌫','Icy Fog'],
  51:['🌦','Light Drizzle'], 53:['🌦','Drizzle'], 55:['🌧','Heavy Drizzle'],
  61:['🌧','Light Rain'], 63:['🌧','Rain'], 65:['🌧','Heavy Rain'],
  80:['🌦','Showers'], 81:['🌧','Showers'], 82:['🌧','Heavy Showers'],
  95:['⛈','Thunderstorm']
};

function to12(t) {
  let [h, m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')}${ap}`;
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const res = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=40.4168&longitude=-3.7038' +
      '&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset' +
      '&temperature_unit=fahrenheit&timezone=Europe/Madrid' +
      '&start_date=2026-03-24&end_date=2026-03-28'
    );
    const data = await res.json();
    const d = data.daily;
    let daysHtml = '', sunHtml = '';

    DATES.forEach(date => {
      const idx = d.time.indexOf(date);
      if (idx === -1) return;
      const hi = Math.round(d.temperature_2m_max[idx]);
      const lo = Math.round(d.temperature_2m_min[idx]);
      const [icon, cond] = WMO[d.weathercode[idx]] || ['🌡','Unknown'];
      const rise = to12(d.sunrise[idx].split('T')[1]);
      const set  = to12(d.sunset[idx].split('T')[1]);

      daysHtml += `
        <div class="day-card">
          <div class="day-label">${DAY_NAMES[date]}</div>
          <div class="day-date">${DATE_LABELS[date]}</div>
          <span class="weather-icon">${icon}</span>
          <div class="condition">${cond}</div>
          <div class="temps"><span class="hi">${hi}°</span><span class="lo">${lo}°</span></div>
        </div>`;

      sunHtml += `
        <div class="sun-block">
          <div class="sun-label">${DAY_NAMES[date]}</div>
          <div class="sun-item">🌅 ${rise}</div>
          <div class="sun-item">🌇 ${set}</div>
        </div>`;
    });

    document.getElementById('daysGrid').innerHTML = daysHtml;
    document.getElementById('sunStrip').innerHTML = sunHtml;
    document.getElementById('footer').textContent = 'Updated ' + new Date().toLocaleTimeString() + ' · °F · Open-Meteo';
  } catch(e) {
    document.getElementById('daysGrid').innerHTML = '<div class="loading-text" style="grid-column:span 5">Could not load forecast. Try refreshing.</div>';
  }
  btn.classList.remove('spinning');
}
loadAll();
</script>
</body>
</html>
