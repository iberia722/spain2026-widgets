<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcelona Map · Spain 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #f7f6f3; display: flex; flex-direction: column; height: 100vh; }
  .header { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e8e5e0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
  .header-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .header-sub { font-size: 10px; color: #aaa; margin-top: 1px; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #666; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.15); flex-shrink: 0; }
  #map { flex: 1; width: 100%; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">🏙 Barcelona · Mar 21–23</div>
    <div class="header-sub">Spain 2026 · 12 locations · click pins for details</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e07020"></div> Hotel</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2980b9"></div> Site</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div> Museum</div>
    <div class="legend-item"><div class="legend-dot" style="background:#16a085"></div> Beach</div>
  </div>
</div>
<div id="map"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map').setView([41.393, 2.172], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
}).addTo(map);

const COLORS = { hotel:'#e07020', site:'#2980b9', museum:'#8e44ad', beach:'#16a085', neighborhood:'#7f8c8d' };

function makeIcon(type, isHotel) {
  const color = COLORS[type] || '#666';
  const svg = isHotel
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28"><path d="M3 0H19V16H14V24H8V16H3Z" fill="${color}" stroke="white" stroke-width="1.5"/></svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"><circle cx="9" cy="9" r="7" fill="${color}" stroke="white" stroke-width="2"/></svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: isHotel?[22,28]:[18,18], iconAnchor: isHotel?[11,28]:[9,9], popupAnchor: [0, isHotel?-28:-9] });
}

[
  { name:"🏨 HCC St. Moritz", type:"hotel", isHotel:true, lat:41.3910625, lng:2.1682161, typeLabel:"Hotel · Your Base", note:"Eixample district · 4.4★", url:"https://maps.google.com/?cid=12416651841087262807" },
  { name:"Sagrada Família", type:"site", lat:41.4036299, lng:2.1743558, typeLabel:"Landmark", note:"Book tickets in advance! Mon–Sat 9am–6pm, Sun 10:30–6 · 4.8★", url:"https://maps.google.com/?cid=11229913421514525008" },
  { name:"Park Güell", type:"site", lat:41.4144948, lng:2.1526945, typeLabel:"Park", note:"Gaudí park — great city views. Timed entry required · 4.4★", url:"https://maps.google.com/?cid=9915250311879642712" },
  { name:"Gothic Quarter", type:"site", lat:41.3819247, lng:2.1773052, typeLabel:"Neighborhood", note:"Medieval labyrinth streets", url:"https://maps.google.com/?cid=13251136864134211503" },
  { name:"La Rambla → El Born Walk", type:"site", lat:41.3856087, lng:2.1698166, typeLabel:"Walk", note:"Classic Barcelona stroll · 4.4★", url:"https://maps.google.com/?cid=2647825951332941252" },
  { name:"Picasso Museum", type:"museum", lat:41.3852706, lng:2.1809472, typeLabel:"Museum", note:"Closed Mondays · Tue–Sun 10am–7pm · 4.4★", url:"https://maps.google.com/?cid=2810561113253530723" },
  { name:"Barcelona Cathedral", type:"site", lat:41.383962, lng:2.1761991, typeLabel:"Church", note:"Free entry mornings · roof has great views · 4.6★", url:"https://maps.google.com/?cid=1654528761399433347" },
  { name:"Santa Maria del Mar", type:"site", lat:41.383887, lng:2.1820711, typeLabel:"Basilica · El Born", note:"Stunning Gothic basilica · 4.7★", url:"https://maps.google.com/?cid=13023447345839268192" },
  { name:"Barceloneta Beach", type:"beach", lat:41.3783713, lng:2.1924685, typeLabel:"Beach", note:"Mediterranean waterfront · 4.4★", url:"https://maps.google.com/?cid=2201713585473283579" },
  { name:"Barrio de Gràcia", type:"neighborhood", lat:41.4096291, lng:2.1552782, typeLabel:"Neighborhood", note:"Bohemian neighborhood — great cafés & wandering", url:"https://maps.google.com/?cid=16724891438747279206" },
  { name:"Plaça Sant Felip Neri", type:"site", lat:41.383452, lng:2.1750541, typeLabel:"Hidden Square", note:"Quiet & beautiful Gothic Quarter gem", url:"https://maps.google.com/?cid=15545699584430683130" },
  { name:"Roman City Walls", type:"site", lat:41.383825, lng:2.1747863, typeLabel:"Historic Site", note:"Ancient Roman ruins · 4.4★", url:"https://maps.google.com/?cid=5858346533474930061" }
].forEach(p => {
  L.marker([p.lat, p.lng], { icon: makeIcon(p.type, p.isHotel), zIndexOffset: p.isHotel?1000:0 })
   .addTo(map)
   .bindPopup(`<div style="font-family:'IBM Plex Sans',sans-serif;min-width:180px;max-width:220px">
     <div style="font-weight:600;font-size:13px;color:#1a1a1a;margin-bottom:2px">${p.name}</div>
     <div style="font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:${COLORS[p.type]||'#666'};margin-bottom:4px">${p.typeLabel}</div>
     <div style="font-size:11px;color:#555;line-height:1.45">${p.note}</div>
     <a href="${p.url}" target="_blank" style="display:inline-block;margin-top:5px;font-size:10px;color:#2980b9;text-decoration:none">Open in Google Maps ↗</a>
   </div>`, { maxWidth:240 });
});
</script>
</body>
</html>
