<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segovia Weather - March 27</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .weather-card {
            background: white;
            border-radius: 16px;
            padding: 20px 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 24px;
            max-width: 700px;
        }
        .date-section {
            text-align: center;
            min-width: 70px;
        }
        .day {
            font-size: 13px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .date {
            font-size: 12px;
            color: #9ca3af;
        }
        .divider {
            width: 1px;
            height: 60px;
            background: #e5e7eb;
        }
        .icon-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .weather-icon {
            font-size: 48px;
            line-height: 1;
        }
        .condition {
            font-size: 12px;
            color: #6b7280;
            white-space: nowrap;
        }
        .temp-section {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .temperature {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .temp-high {
            font-size: 32px;
            font-weight: 600;
            color: #ef4444;
        }
        .temp-low {
            font-size: 32px;
            font-weight: 600;
            color: #3b82f6;
        }
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .location {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }
        .jacket-tip {
            font-size: 12px;
            color: #6b7280;
            background: #fef3c7;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #fde68a;
            white-space: nowrap;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .weather-card {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <div class="date-section">
            <div class="day">FRI</div>
            <div class="date">Mar 27</div>
        </div>
        
        <div class="divider"></div>
        
        <div class="icon-section">
            <div class="weather-icon">🌤️</div>
            <div class="condition">Light breeze</div>
        </div>
        
        <div class="divider"></div>
        
        <div class="temp-section">
            <div class="temperature">
                <span class="temp-high">60°</span>
                <span class="temp-low">50°</span>
            </div>
        </div>
        
        <div class="divider"></div>
        
        <div class="info-section">
            <div class="location">📍 Segovia, Spain</div>
            <div class="jacket-tip">🧥 Light jacket recommended</div>
        </div>
    </div>
</body>
</html>
