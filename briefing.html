  {name:'Torre de Madrid',type:'Rooftop',icon:'🏙️',rating:4.5,price:'$$',note:'360° views from Sabatini rooftop. Sunset is unmissable.',coords:[40.4226,-3.7122]},
  {name:'Museo del Prado',type:'Museum',icon:'🎨',rating:4.9,price:'$',note:'World\'s greatest Spanish art collection. FREE after 6PM weekdays.',coords:[40.4138,-3.6922]},

  {name:'Cava Baja',type:'Tapas Street',icon:'🍺',rating:4.7,price:'$$',note:'Best tapas crawl street in Madrid. La Latina neighborhood. Start at dusk.',coords:[40.4118,-3.7091]},
  {name:'La Paloma Cubana',type:'Cuban',icon:'🇨🇺',rating:4.4,price:'$$',note:'Solid Cuban food if you need a taste of home. Ropa vieja, mojitos.',coords:[40.4190,-3.7010]},
  {name:'Alhambra Restaurant',type:'Cuban',icon:'🎺',rating:4.3,price:'$$',note:'Cuban-Spanish fusion. Live music some nights. Good mojitos.',coords:[40.4165,-3.6990]}
];

let currentDay = 0;
let chatHistory = [];
let eurRate = 1.15;
let reminderStates = {};
let alertCache = null;
let picksCache = {};

function getClosestDayIndex() {
  const today = new Date();
  today.setHours(0,0,0,0);
  let closest = 0;
  let minDiff = Infinity;
  DAYS.forEach((d,i) => {
    const dt = new Date(d.date);
    const diff = Math.abs(dt - today);
    if(diff < minDiff){ minDiff = diff; closest = i; }
  });
  return closest;
}

function init() {
  currentDay = getClosestDayIndex();
  const now = new Date();
  document.getElementById('todayLabel').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  buildPills();
  renderDay();
  fetchRate();
}

function buildPills() {
  const container = document.getElementById('dayPills');
  container.innerHTML = '';
  DAYS.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'day-pill' + (i===currentDay?' active':'');
    btn.innerHTML = `<div>${d.label}</div><div style="font-size:9px;opacity:0.8">${d.city}</div>`;
    btn.onclick = () => { currentDay=i; buildPills(); renderDay(); };
    container.appendChild(btn);
  });
}

function renderDay() {
  const d = DAYS[currentDay];
  // Header
  document.getElementById('dayHeader').innerHTML = `
    <div class="today-card">
      <div class="today-left">
        <div class="day-name">${d.emoji} ${d.name}</div>
        <div class="day-date">${new Date(d.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
        <div class="day-hotel">🏨 ${d.hotel}</div>
      </div>
      <div class="weather-box">
        <div class="weather-icon">${d.weather.icon}</div>
        <div class="weather-temps">${d.weather.hi}° / ${d.weather.lo}°F</div>
        <div class="weather-desc">${d.weather.desc}</div>
      </div>
    </div>`;
  renderSchedule();
  renderReminders();
}

function renderSchedule() {
  const d = DAYS[currentDay];
  let html = '<div class="card"><div class="sec-label">Today\'s Schedule</div>';
  d.events.forEach(e => {
    html += `<div class="event-row">
      <div class="event-icon">${e.icon}</div>
      <div class="event-body">
        <div class="event-title">${e.title}</div>
        <div class="event-detail">${e.detail.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="event-time">${e.time}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('panel-schedule').innerHTML = html;
}

function renderReminders() {
  const d = DAYS[currentDay];
  let html = '<div class="card"><div class="sec-label">Day Checklist</div>';
  d.reminders.forEach((r,i) => {
    const key = d.date+'_'+i;
    const done = reminderStates[key] || false;
    html += `<div class="reminder-item">
      <span class="reminder-check" onclick="toggleReminder('${key}',this)">${done?'✅':'⬜'}</span>
      <span class="reminder-text${done?' done':''}" id="rt_${key}">${r}</span>
    </div>`;
  });
  html += '</div>';
  document.getElementById('panel-reminders').innerHTML = html;
}

function toggleReminder(key, el) {
  reminderStates[key] = !reminderStates[key];
  el.textContent = reminderStates[key] ? '✅' : '⬜';
  const txt = document.getElementById('rt_'+key);
  if(txt) txt.className = 'reminder-text' + (reminderStates[key]?' done':'');
}

async function loadPicks() {
  const d = DAYS[currentDay];
  const panel = document.getElementById('panel-picks');
  if(picksCache[d.date]) { panel.innerHTML = picksCache[d.date]; return; }

  panel.innerHTML = `<div class="card"><div class="sec-label">AI Picks for Today</div><button class="big-btn" id="genBtn" onclick="generatePicks()">✨ Generate AI Picks for ${d.name}</button></div>`;

  // Show tips while waiting
  let tipsHtml = '<div class="card"><div class="sec-label">Local Tips</div>';
  d.tips.forEach(t => { tipsHtml += `<div class="tip-box">${t}</div>`; });
  tipsHtml += '</div>';
  panel.innerHTML += tipsHtml;
}

async function generatePicks() {
  const d = DAYS[currentDay];
  const panel = document.getElementById('panel-picks');
  document.getElementById('genBtn').disabled = true;
  document.getElementById('genBtn').textContent = '⏳ Generating picks...';

  const prompt = `You are a Spain travel concierge for a family of 3 (father John, age 54, brown belt BJJ; wife Aymara; daughter Maria Elena) visiting ${d.city} on ${d.date} (${d.name}).

Their schedule today: ${d.events.map(e=>e.title+' at '+e.time).join(', ')}.

Give specific, insider recommendations for:
🌅 MORNING: Best thing to do first
🍽️ LUNCH: Best lunch spot and what to order  
🌆 AFTERNOON: Top activity or experience
🌙 DINNER: Best dinner recommendation with dish suggestions
💡 PRO TIP: One local secret they shouldn't miss

Keep it concise, specific, and practical. Use the schedule context. No generic advice.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'Could not generate picks.';

    let html = `<div class="card"><div class="sec-label">AI Picks for Today</div><div class="ai-response">${text}</div>
      <button class="outline-btn" onclick="generatePicks()" style="margin-top:10px">🔄 Regenerate</button></div>`;
    let tipsHtml = '<div class="card"><div class="sec-label">Local Tips</div>';
    d.tips.forEach(t => { tipsHtml += `<div class="tip-box">${t}</div>`; });
    tipsHtml += '</div>';
    picksCache[d.date] = html + tipsHtml;
    panel.innerHTML = picksCache[d.date];
  } catch(e) {
    document.getElementById('genBtn').disabled = false;
    document.getElementById('genBtn').textContent = '⚠️ Error — try again';
  }
}

async function loadAlerts() {
  const panel = document.getElementById('panel-alerts');
  const d = DAYS[currentDay];
  if(alertCache) { panel.innerHTML = alertCache; return; }

  panel.innerHTML = `<div class="card"><div class="sec-label">Live Alerts</div>
    <button class="big-btn" id="alertBtn" onclick="fetchAlerts()">🔍 Check Live Alerts for ${d.city}</button>
    <div class="alert-box clear">✅ No cached alerts — tap above to check live status</div></div>`;
}

async function fetchAlerts() {
  const d = DAYS[currentDay];
  document.getElementById('alertBtn').disabled = true;
  document.getElementById('alertBtn').textContent = '⏳ Checking live status...';

  const prompt = `Search for current travel alerts for ${d.city}, Spain for a tourist visiting on ${d.date}. Check for:
1. Renfe train disruptions or strikes
2. Local strikes or protests (huelgas)
3. Major road closures or metro disruptions
4. Tourist site closures or special events
5. Safety advisories

Be specific and concise. If no issues found, say "All clear" for each category.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n') || 'Could not fetch alerts.';
    alertCache = `<div class="card"><div class="sec-label">Live Alerts — ${d.city}</div>
      <div class="ai-response">${text}</div>
      <button class="outline-btn" onclick="alertCache=null;fetchAlerts()" style="margin-top:10px">🔄 Refresh</button></div>`;
    document.getElementById('panel-alerts').innerHTML = alertCache;
  } catch(e) {
    document.getElementById('alertBtn').disabled = false;
    document.getElementById('alertBtn').textContent = '⚠️ Error — tap to retry';
  }
}

async function fetchRate() {
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=EUR&to=USD');
    const data = await res.json();
    eurRate = data.rates.USD;
    updateCurrency();
  } catch(e) {}
}

function updateCurrency() {
  const eurInput = document.getElementById('eurInput');
  const usdOutput = document.getElementById('usdOutput');
  const rateInfo = document.getElementById('rateInfo');
  if(!eurInput) return;
  const val = parseFloat(eurInput.value) || 0;
  usdOutput.value = (val * eurRate).toFixed(2);
  if(rateInfo) rateInfo.innerHTML = `1 EUR = <span>$${eurRate.toFixed(4)} USD</span>`;
}

function usdToEur() {
  const eurInput = document.getElementById('eurInput');
  const usdOutput = document.getElementById('usdOutput');
  const val = parseFloat(usdOutput.value) || 0;
  eurInput.value = (val / eurRate).toFixed(2);
}

function renderCurrency() {
  const refs = [
    {name:'Café con leche',eur:1.5},{name:'Menú del día (lunch)',eur:13},{name:'Cerveza/vino',eur:3},
    {name:'Taxi (short ride)',eur:8},{name:'Metro ticket',eur:1.5},{name:'Museum entry',eur:15},
    {name:'Tapas plate',eur:4},{name:'Dinner (per person)',eur:35},{name:'AVE to Segovia',eur:12},
    {name:'Bocadillo sandwich',eur:4}
  ];
  let html = `<div class="card"><div class="sec-label">EUR ↔ USD Converter</div>
    <div class="currency-row">
      <input class="currency-input" id="eurInput" type="number" value="1" oninput="updateCurrency()">
      <div class="currency-label" style="color:#d4a843;font-size:16px">€</div>
      <div style="font-size:20px;color:#8a9980">=</div>
      <input class="currency-input" id="usdOutput" type="number" value="${eurRate.toFixed(2)}" oninput="usdToEur()">
      <div class="currency-label" style="color:#5599dd;font-size:16px">$</div>
    </div>
    <div class="rate-display" id="rateInfo">1 EUR = <span>$${eurRate.toFixed(4)} USD</span> · Live rate</div>
    </div>
    <div class="card"><div class="sec-label">Quick Reference</div>
    <div class="ref-grid">`;
  refs.forEach(r => {
    html += `<div class="ref-item"><div class="ref-name">${r.name}</div><div class="ref-price">€${r.eur} = $${(r.eur*eurRate).toFixed(0)}</div></div>`;
  });
  html += '</div></div>';
  document.getElementById('panel-currency').innerHTML = html;
}

function renderPlaces() {
  const d = DAYS[currentDay];
  const isMadrid = d.city === 'Madrid' || d.city === 'Segovia';
  let html = '';

  if(!isMadrid) {
    html = `<div class="card"><div class="sec-label">Places Database</div>
      <div class="tip-box">📍 Madrid places database available when you're in Madrid (Mar 24-28).<br><br>
      For ${d.city}, use the AI Concierge tab to ask for specific recommendations!</div></div>`;
  } else {
    const types = [...new Set(MADRID_PLACES.map(p=>p.type))];
    types.forEach(type => {
      const places = MADRID_PLACES.filter(p=>p.type===type);
      html += `<div class="card"><div class="sec-label">${type}</div>`;
      places.forEach(p => {
        html += `<div class="place-row">
          <div class="place-icon">${p.icon}</div>
          <div class="place-body">
            <div class="place-name">${p.name}</div>
            <div class="place-type">${p.type}</div>
            <div class="place-note">${p.note}</div>
            <div class="place-meta">
              ${p.rating ? `<span class="stars">⭐ ${p.rating}</span>` : ''}
              <span class="price-tag">${p.price}</span>
              <a class="map-link" href="https://www.google.com/maps/search/${encodeURIComponent(p.name+' Madrid')}" target="_blank">📍 Map</a>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
  }
  document.getElementById('panel-places').innerHTML = html;
}

function renderConcierge() {
  const d = DAYS[currentDay];
  const quickQs = [
    'Best tapas near my hotel tonight?',
    `What time does ${d.city} come alive?`,
    'Any BJJ gyms nearby for a drop-in?',
    'Best souvenir shop recommendations?',
    'Safest neighborhoods to walk at night?'
  ];
  let html = `<div class="quick-q">` +
    quickQs.map(q=>`<button onclick="sendQuick('${q}')">${q}</button>`).join('') +
    `</div>
    <div class="chat-wrap" id="chatWrap">
      <div class="chat-msg ai">¡Hola! I'm your Spain 2026 concierge. Currently helping with <strong>${d.name}</strong> in ${d.city}. Ask me anything — restaurants, directions, BJJ gyms, local tips! 🇪🇸</div>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chatInput" rows="2" placeholder="Ask anything about your trip..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="chat-send" onclick="sendChat()">Send</button>
    </div>`;
  document.getElementById('panel-concierge').innerHTML = html;
  chatHistory = [];
}

function sendQuick(q) {
  document.getElementById('chatInput').value = q;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  const d = DAYS[currentDay];
  const wrap = document.getElementById('chatWrap');
  wrap.innerHTML += `<div class="chat-msg user">${msg}</div>`;
  wrap.innerHTML += `<div class="chat-msg ai" id="aiTyping">⏳ Thinking...</div>`;
  wrap.scrollTop = wrap.scrollHeight;

  chatHistory.push({role:'user',content:msg});

  const systemPrompt = `You are a concierge for a family Spain trip. Family: John (54, American/Spanish dual citizen, brown belt BJJ 10 yrs), wife Aymara, daughter Maria Elena. Currently: ${d.name} in ${d.city} on ${d.date}. Hotel: ${d.hotel}. Today's schedule: ${d.events.map(e=>e.title).join(', ')}. Be helpful, concise, specific. You speak English and Spanish. Add occasional Spanish phrases where natural.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system: systemPrompt,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages: chatHistory
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n') || 'Lo siento, try again.';
    chatHistory.push({role:'assistant',content:text});
    document.getElementById('aiTyping').textContent = text;
    wrap.scrollTop = wrap.scrollHeight;
  } catch(e) {
    document.getElementById('aiTyping').textContent = 'Connection error — check your internet and try again.';
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');

  if(name==='picks') loadPicks();
  if(name==='alerts') loadAlerts();
  if(name==='currency') renderCurrency();
  if(name==='places') renderPlaces();
  if(name==='concierge') renderConcierge();
  if(name==='reminders') renderReminders();
}

init();
</script>

</html>
